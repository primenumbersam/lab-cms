backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "main"
    label: "Main Website"
    delete: false
    files:
      - label: "Home Page"
        name: "homepage"
        file: "content/_index.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Link Title", name: "linkTitle", widget: "string"}
          - {label: "Description", name: "description", widget: "string"}
          - {label: "Body", name: "body", widget: "markdown"}

  - name: "library"
    label: "Library (Books & Chapters)"
    folder: "content"
    extension: "md"
    format: "frontmatter"
    create: true
    nested:
      depth: 3 # Changed from 'true' to an object with depth
    filter: {field: "type", value: "docs"}
    path: "{{dirname}}/{{slug}}"
    fields:
      - {label: "Type", name: "type", widget: "hidden", default: "docs"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Weight", name: "weight", widget: "number", default: 10}
      - {label: "Body", name: "body", widget: "markdown"}
